name: Build & Deploy

# main 브랜치 push 시 실행 + 수동 실행 가능
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 체크아웃
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # actions/configure-pages@v5로 Pages 환경/base_path 확보
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Ruby 3.3 + bundler 2.7.2 세팅
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'     # 3.1 대신 3.3 권장
          rubygems: 'latest'      # 중요: 최신 RubyGems로 올려서 Bundler 2.7.x 설치 가능
          bundler: '2.7.2'        # Gemfile.lock과 동일하게
          bundler-cache: false

      # Gemfile.lock에 리눅스 플랫폼 추가(필요 시)
      - name: Add Linux platform to Gemfile.lock (if needed)
        run: |
          if [ -f Gemfile.lock ]; then
            bundle lock --add-platform x86_64-linux || true
          fi

      # bundle install
      - name: Install gems
        run: |
          bundle config set path 'vendor/bundle'
          bundle config set without 'development test'
          bundle install --jobs 4 --retry 3

      # jekyll build --baseurl "${{ steps.pages.outputs.base_path }}" 실행
      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

